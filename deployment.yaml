apiVersion: apps/v1
kind: Deployment

metadata:
  name: corporate-website

spec:
  replicas: 2

  selector:
    matchLabels:
      app: corporate-website

  template:
    metadata:
      labels:
        app: corporate-website

    spec:
      containers:
        - name: corporate-website
          image: corporate-website:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80
